services:
  - type: web
    name: portfolio-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: server
    envVars:
      - key: NODE_ENV
        value: production
```


1. Allez sur https://render.com
2. **Sign up** avec GitHub
3. **New +** → **Web Service**
4. **Connect repository** → Sélectionnez votre repo `portfolio`
5. Configuration :
   - **Name** : `portfolio-api`
   - **Region** : `Frankfurt (EU Central)`
   - **Branch** : `main`
   - **Root Directory** : `server`
   - **Environment** : `Node`
   - **Build Command** : `npm install`
   - **Start Command** : `npm start`
   - **Instance Type** : `Free`

6. **Environment Variables** → **Add Environment Variable** :

| Key | Value |
|-----|-------|
| `MONGO_URI` | `mongodb+srv://portfolio-user:VotreMotDePasse@...` |
| `JWT_SECRET` | Générez avec `openssl rand -base64 32` |
| `NODE_ENV` | `production` |

7. **Create Web Service**

⏳ Attendez 2-5 minutes que le déploiement se termine.

✅ Votre API sera accessible à : `https://portfolio-api-xxxx.onrender.com`

### 6. Testez votre API

Ouvrez dans le navigateur :
```
https://portfolio-api-xxxx.onrender.com/api/projects